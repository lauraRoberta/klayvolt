<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastros | Klyvolt</title>
  <link rel="stylesheet" href="../css/base.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="index.html">
      <div class="brand-symbol">K</div>
      <span>Klyvolt</span>
    </a>

    <nav>
      <a href="index.html">Home</a>
      <a href="dashboard.html">Dashboard</a>
      <a href="chatbot.html">Chatbot</a>
      <a href="cadastros.html">Cadastros</a>
      <a href="sobre.html">Sobre</a>
    </nav>
  </header>

  <main class="page">
    <section class="page-title">
      <p class="eyebrow">Registros do sistema</p>
      <h1>Cadastros</h1>
      <p>Área para cadastrar equipamentos, empresas e metas de consumo.</p>
    </section>

    <section class="form-card">
      <h2>Novo equipamento</h2>
      <form>
        <label>Código</label>
        <input type="number" placeholder="Ex: 1">

        <label>Nome</label>
        <input type="text" placeholder="Ex: Ar-condicionado">

        <label>Descrição</label>
        <input type="text" placeholder="Ex: Equipamento de climatização">

        <label>Quantidade</label>
        <input type="number" placeholder="Ex: 2">

        <label>Valor / Consumo</label>
        <input type="number" placeholder="Ex: 42.5">

        <label>Indicador</label>
        <input type="text" placeholder="Ex: Consumo alto">

        <button type="button">Cadastrar</button>
      </form>
    </section>
  </main>
</body>
</html>
